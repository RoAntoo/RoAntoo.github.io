<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - CyberStore</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
  <link rel="stylesheet" href="./src/admin.css" />
  <!-- Usar la misma fuente que la app principal -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
  
  <div id="loginSection" class="admin-container">
    <div class="terminal-box">
      <h2>&gt; REQUERIDA_CREDENCIAL</h2>
      <p class="sys-msg">SISTEMA_ADMINISTRATIVO_RESTRINGIDO</p>
      <input type="password" id="apiKeyInput" placeholder="INGRESE_API_KEY..." />
      <button id="loginBtn" class="cyber-btn">AUTENTICAR</button>
      <p id="loginError" class="error-msg hidden">Acceso Denegado</p>
    </div>
  </div>

  <div id="dashboardSection" class="admin-container hidden">
    <header class="admin-header">
      <h2>&gt; ADMIN_DASHBOARD_</h2>
      <button id="logoutBtn" class="cyber-btn cyber-btn-sm cyber-btn-pink">CERRAR_SESIÓN</button>
    </header>

    <div class="tabs">
      <button class="tab-btn active" data-tab="ordenes">ÓRDENES</button>
      <button class="tab-btn" data-tab="productos">PRODUCTOS</button>
    </div>

    <main class="tab-content">
      <section id="ordenesTab">
        <h3>Últimas Órdenes</h3>
        <div class="table-wrapper">
          <table id="ordenesTable">
            <thead>
              <tr>
                <th>ID_CORTADO</th>
                <th>CLIENTE</th>
                <th>TOTAL</th>
                <th>ESTADO</th>
                <th>ACCIÓN</th>
              </tr>
            </thead>
            <tbody id="ordenesBody">
              <!-- JS Render -->
            </tbody>
          </table>
        </div>
      </section>

      <section id="productosTab" class="hidden">
          <div class="catalog-header">
            <h2>[ CATÁLOGO_DINÁMICO ]</h2>
            <button id="mostrarFormBtn" class="cyber-btn cyber-btn-sm">+ NUEVO_PRODUCTO</button>
          </div>

          <div id="nuevoProductoFormContainer" class="hidden new-product-form-container">
            <h3>&gt; INICIAR_CARGA</h3>
          <form id="nuevoProductoForm">
            <div class="form-group">
              <label for="prodTitulo">TÍTULO</label>
              <input type="text" id="prodTitulo" required placeholder="Ej: Cyberpunk Manga..." />
            </div>
            <div class="form-group">
              <label for="prodPrecio">PRECIO (ARS)</label>
              <input type="number" id="prodPrecio" required step="1" min="1" placeholder="Ej: 5000" />
            </div>
            <div class="form-group" style="position: relative;">
              <label for="prodCategoria">CATEGORÍA</label>
              <input type="text" id="prodCategoria" autocomplete="off" required placeholder="Ej: Ficción, Rol, Arte..." role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="customCategorias" />
              <div id="customCategorias" class="custom-dropdown hidden" role="listbox"></div>
            </div>
            <div class="form-group">
              <label for="prodImagen">URL PORTADA</label>
              <input type="url" id="prodImagen" required placeholder="https://..." />
            </div>
            <div class="form-group">
              <label for="prodDrive">LINK DE DESCARGA (DRIVE)</label>
              <input type="url" id="prodDrive" required placeholder="https://drive.google.com/..." />
            </div>
            <div class="form-group">
              <label for="prodDesc">DESCRIPCIÓN</label>
              <textarea id="prodDesc" rows="3" required placeholder="Breve descripción..."></textarea>
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
              <button type="submit" class="cyber-btn">GUARDAR</button>
              <button type="button" id="cancelarFormBtn" class="cyber-btn cyber-btn-pink">CANCELAR</button>
            </div>
          </form>
        </div>

        <div class="table-wrapper">
          <table id="productosTable">
            <thead>
              <tr>
                <th>TÍTULO</th>
                <th>PRECIO</th>
                <th>DRIVE_URL</th>
                <th>ACCIÓN</th>
              </tr>
            </thead>
            <tbody id="productosBody">
              <!-- JS Render -->
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <!-- Modal Edición -->
      <div id="modalEdicion" class="product-detail-view hidden" role="dialog" aria-modal="true" aria-labelledby="modalEdicionTitle">
        <div class="product-detail-container" style="max-width: 600px;">
          <h3 id="modalEdicionTitle" class="section-title blink" style="color: var(--accent-cyan); font-size: 1.5rem; margin-bottom: 2rem;">&gt; MODO_EDICIÓN_ACTIVADO</h3>
        <form id="editarProductoForm">
          <input type="hidden" id="editProdId" />
          <div class="form-group">
            <label for="editProdTitulo">TÍTULO</label>
            <input type="text" id="editProdTitulo" required />
          </div>
          <div class="form-group">
            <label for="editProdPrecio">PRECIO (ARS)</label>
            <input type="number" id="editProdPrecio" required step="1" min="1" />
          </div>
          <div class="form-group" style="position: relative;">
            <label for="editProdCategoria">CATEGORÍA</label>
            <input type="text" id="editProdCategoria" autocomplete="off" required role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="customCategoriasEdit" />
            <div id="customCategoriasEdit" class="custom-dropdown hidden" role="listbox"></div>
          </div>
          <div class="form-group">
            <label for="editProdImagen">URL PORTADA</label>
            <input type="url" id="editProdImagen" required />
          </div>
          <div class="form-group">
            <label for="editProdDrive">LINK DE DESCARGA (DRIVE)</label>
            <input type="url" id="editProdDrive" required />
          </div>
          <div class="form-group">
            <label for="editProdDesc">DESCRIPCIÓN</label>
            <textarea id="editProdDesc" rows="3" required></textarea>
          </div>
          <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit" class="cyber-btn">GUARDAR CAMBIOS</button>
            <button type="button" id="cancelarEditBtn" class="cyber-btn cyber-btn-pink">CANCELAR</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="./src/admin.ts"></script>
</body>
</html>
